{% extends "layout/base.html" %}

{% block title %}My Profile{% endblock %}

{% block content %}

<div class="page-header">
    <h2><i class="fas fa-user"></i> My Profile</h2>
</div>

<div class="profile-container">

    <!-- ================= PROFILE CARD ================= -->
    <div class="card profile-card">

        <div class="profile-header">
            <img src="{{ url_for('static', filename='images/avatar.png') }}" alt="Avatar" class="profile-avatar">
            <h3>{{ user.name }}</h3>
            <p>{{ user.role | capitalize }}</p>
        </div>

        <div class="profile-body">

            <form method="POST" action="{{ url_for('student.profile') }}"></form>

        
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" value="{{ user.name }}" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ user.email }}" required>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="department" value="{{ user.department }}" required>
                </div>

                <div class="form-group">
                    <label>Semester</label>
                    <input type="number" name="semester" value="{{ user.semester }}" required>
                </div>

                <div class="form-group">
                    <label>Change Password</label>
                    <input type="password" name="password" placeholder="New Password">
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Update Profile
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
