{% extends "layout/base.html" %}

{% block title %}My Profile{% endblock %}

{% block content %}

<div class="page-header">
    <h2><i class="fas fa-user"></i> My Profile</h2>
</div>

<div class="profile-container">

    <div class="card profile-card">

        <div class="profile-header">
            <img src="{{ url_for('static', filename='images/avatar.png') }}"
                 alt="Avatar"
                 class="profile-avatar">

            <h3>{{ student.name }}</h3>
            <p>{{ student.role|capitalize }}</p>
        </div>

        <div class="profile-body">

            <form>

                <div class="form-group">
                    <label>Full Name</label>
                    <input
                        type="text"
                        value="{{ student.name }}"
                        readonly>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input
                        type="email"
                        value="{{ student.email }}"
                        readonly>
                </div>

                <div class="form-group">
                    <label>Department</label>

                    {% if student.department %}
                        <input
                            type="text"
                            value="{{ student.department }}"
                            readonly>
                    {% else %}
                        <input
                            type="text"
                            value="N/A"
                            readonly>
                    {% endif %}
                </div>

                <div class="form-group">
                    <label>Semester</label>
                    <input
                        type="text"
                        value="{{ student.semester }}"
                        readonly>
                </div>

                <div class="form-group">
                    <label>Total Feedback Submitted</label>
                    <input
                        type="text"
                        value="{{ total_feedback }}"
                        readonly>
                </div>

                <div class="form-group">
                    <label>Average Rating Given</label>
                    <input
                        type="text"
                        value="{{ avg_rating }}"
                        readonly>
                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
