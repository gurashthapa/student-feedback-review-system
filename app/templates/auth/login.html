{% extends "layout/auth_base.html" %}
{% block title %}Login{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-header">
            <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
            <p>Student Feedback Review System</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    placeholder="Enter email"
                    required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    required>
            </div>

            <button
                type="submit"
                class="btn btn-primary btn-block">

                <i class="fas fa-lock"></i>
                Login

            </button>

        </form>

        <div class="auth-footer">

            <p class="text-center">
                <a href="{{ url_for('auth.forgot_password') }}">
                    Forgot Password?
                </a>
            </p>

            <hr>

            <p class="text-center">
                Don't have an account?
            </p>

            <p class="text-center">
                <a href="{{ url_for('auth.register') }}" class="btn btn-success btn-block">
                    <i class="fas fa-user-plus"></i>
                    Register Here
                </a>
            </p>

        </div>

    </div>

</div>

{% endblock %}
