{% extends "layout/base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}

<div class="page-header">
    <h2><i class="fas fa-cog"></i> System Settings</h2>
</div>

<div class="settings-container">

    <!-- ================= PROFILE SETTINGS ================= -->
    <div class="card settings-card">

        <h3><i class="fas fa-user"></i> Profile Settings</h3>

        <form method="POST" action="{{ url_for('admin.update_profile') }}">

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" value="{{ user.name }}" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ user.email }}" required>
            </div>

            <div class="form-group">
                <label>Change Password</label>
                <input type="password" name="password" placeholder="New Password">
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Update Profile
            </button>

        </form>

    </div>


    <!-- ================= SYSTEM SETTINGS ================= -->
    <div class="card settings-card">

        <h3><i class="fas fa-sliders-h"></i> System Preferences</h3>

        <form method="POST" action="{{ url_for('admin.update_settings') }}">

            <div class="form-group">
                <label>Enable Feedback System</label>
                <select name="feedback_enabled">
                    <option value="1" {% if settings.feedback_enabled %}selected{% endif %}>Enabled</option>
                    <option value="0" {% if not settings.feedback_enabled %}selected{% endif %}>Disabled</option>
                </select>
            </div>

            <div class="form-group">
                <label>Allow Student Registration</label>
                <select name="registration_enabled">
                    <option value="1" {% if settings.registration_enabled %}selected{% endif %}>Enabled</option>
                    <option value="0" {% if not settings.registration_enabled %}selected{% endif %}>Disabled</option>
                </select>
            </div>

            <div class="form-group">
                <label>Default Rating Scale</label>
                <select name="rating_scale">
                    <option value="5" {% if settings.rating_scale == 5 %}selected{% endif %}>5 Stars</option>
                    <option value="10" {% if settings.rating_scale == 10 %}selected{% endif %}>10 Scale</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Settings
            </button>

        </form>

    </div>

</div>

{% endblock %}
