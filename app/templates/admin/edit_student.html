{% extends "layout/base.html" %}

{% block title %}Edit Student{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">
        Edit Student
    </h2>

    <div class="card shadow">
        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input
                        type="text"
                        name="full_name"
                        class="form-control"
                        value="{{ student.full_name }}"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label">Student ID</label>
                    <input
                        type="text"
                        name="student_id"
                        class="form-control"
                        value="{{ student.student_id }}"
                        readonly
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        value="{{ student.email }}"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label">Department</label>

                    <select
                        name="department_id"
                        class="form-select"
                        required
                    >

                        {% for department in departments %}

                        <option
                            value="{{ department.id }}"
                            {% if department.id == student.department_id %}selected{% endif %}
                        >
                            {{ department.department_name }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input
                        type="text"
                        name="phone"
                        class="form-control"
                        value="{{ student.phone }}"
                    >
                </div>

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    Update Student
                </button>

                <a
                    href="{{ url_for('admin.students') }}"
                    class="btn btn-secondary"
                >
                    Cancel
                </a>

            </form>

        </div>
    </div>

</div>

{% endblock %}
