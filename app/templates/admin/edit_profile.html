{% extends "layout/base.html" %}

{% block title %}Edit Profile{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow rounded-4">

        <div class="card-header bg-primary text-white">

            <h3>Edit Profile</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        value="{{ user.username }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        value="{{ user.email }}"
                        required>

                </div>

                <button class="btn btn-success">

                    <i class="fas fa-save"></i>

                    Save Changes

                </button>

                <a
                    href="{{ url_for('admin.profile') }}"
                    class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
